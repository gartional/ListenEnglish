<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>英语听力 · 模拟试题</title>
  <style>
    :root {
      --bg: #050816;
      --panel: #0b1220;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      line-height: 1.6;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #fff; }
    p.sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .nav-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .nav-grid a {
      display: block;
      padding: 12px 8px;
      background: var(--panel);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      border: 1px solid rgba(15, 23, 42, 0.6);
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-grid a:hover {
      background: rgba(30, 41, 59, 0.6);
      border-color: rgba(56, 189, 248, 0.3);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>英语听力 · 模拟试题</h1>
  <p class="sub">选择试题进入逐句复述练习（1–48 需先运行批量抓取生成 content/mock01…mock48）</p>
  <nav class="nav-grid" id="nav"></nav>
</div>
<script>
  var list = [];
  for (var i = 1; i <= 48; i++) {
    list.push('<a href="practice.html?mock=' + i + '">' + i + '</a>');
  }
  document.getElementById("nav").innerHTML = list.join("");
</script>
</body>
</html>
