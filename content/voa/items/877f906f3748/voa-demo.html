<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ListenEnglish H5 Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050816;
      color: #ddd;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #fff;
      font-size: 20px;
      margin-bottom: 16px;
    }
    audio {
      width: 100%;
      margin-bottom: 16px;
    }
    .cues {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 8px;
      background: #0b1220;
      padding: 12px 8px;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.6);
    }
    .cue-row {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
      font-size: 15px;
    }
    .cue-row:hover {
      background: #111827;
    }
    .cue-row.active {
      background: #1e293b;
      color: #fff;
      font-weight: 600;
    }
    .time {
      font-size: 12px;
      color: #9ca3af;
      margin-right: 8px;
      white-space: nowrap;
    }
    .text {
      display: inline;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>ListenEnglish H5 Demo（读哪句哪句高亮）</h1>

  <!-- 音频播放器 -->
  <audio id="audio" controls src="./audio.mp3"></audio>

  <!-- 字幕列表 -->
  <div id="cues" class="cues"></div>
</div>

<script>
  // 秒 -> mm:ss
  function formatTime(sec) {
    const s = Math.floor(sec);
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m.toString().padStart(2, "0")}:${r.toString().padStart(2, "0")}`;
  }

  const audioEl = document.getElementById("audio");
  const cuesContainer = document.getElementById("cues");
  let cues = [];
  let activeIndex = null;

  // 加载 cues.json
  fetch("./cues.json")
    .then((res) => res.json())
    .then((data) => {
      cues = data;
      renderCues();
    })
    .catch((err) => {
      console.error("加载 cues.json 失败", err);
      cuesContainer.innerHTML = "<p>无法加载字幕数据。</p>";
    });

  function renderCues() {
    cuesContainer.innerHTML = "";
    cues.forEach((cue, index) => {
      const row = document.createElement("div");
      row.className = "cue-row";
      row.dataset.index = index;

      const timeSpan = document.createElement("span");
      timeSpan.className = "time";
      timeSpan.textContent = `${formatTime(cue.start)}–${formatTime(cue.end)}`;

      const textSpan = document.createElement("span");
      textSpan.className = "text";
      textSpan.textContent = cue.text;

      row.appendChild(timeSpan);
      row.appendChild(textSpan);

      // 点击某一句，跳到那句
      row.addEventListener("click", () => {
        audioEl.currentTime = Math.max(0, cue.start - 0.2);
        audioEl.play();
      });

      cuesContainer.appendChild(row);
    });
  }

  // 根据 currentTime 高亮对应句子
  audioEl.addEventListener("timeupdate", () => {
    if (!cues.length) return;
    const t = audioEl.currentTime;

    let idx = null;
    for (let i = 0; i < cues.length; i++) {
      const c = cues[i];
      if (t >= c.start && t < c.end) {
        idx = i;
        break;
      }
    }

    if (idx === null || idx === activeIndex) return;
    activeIndex = idx;

    const rows = cuesContainer.querySelectorAll(".cue-row");
    rows.forEach((row, i) => {
      if (i === idx) {
        row.classList.add("active");
        // 自动滚动当前句子到中间附近
        const containerTop = cuesContainer.getBoundingClientRect().top;
        const rowTop = row.getBoundingClientRect().top;
        const offset = rowTop - containerTop - cuesContainer.clientHeight / 2;
        cuesContainer.scrollTop += offset;
      } else {
        row.classList.remove("active");
      }
    });
  });
</script>
</body>
</html>
